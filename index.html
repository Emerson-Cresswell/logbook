<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MyLogbook">
  <title>MyLogbook</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png">
  <link rel="icon" href="favicon.ico" sizes="any">
  <script>
    (function () {
      var STORAGE_KEY = "mylogbook.theme";
      var allowed = { light: true, dark: true, system: true };
      var stored = null;
      try { stored = localStorage.getItem(STORAGE_KEY); } catch (error) { stored = null; }
      var preference = allowed[stored] ? stored : "system";
      var resolved = preference === "system"
        ? (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
        : preference;
      document.documentElement.setAttribute("data-theme", resolved);
      document.documentElement.setAttribute("data-theme-preference", preference);
    })();
  </script>
  <link rel="stylesheet" href="styles.css?v=60">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>Procedure & CPD Logbook</h1>
    </header>

    <main>
      <section id="homeScreen" class="screen active">
        <div class="home-shell">
          <div class="home-masthead">
            <div class="home-brand-mark" aria-hidden="true">
              <svg viewBox="0 0 64 64" role="img" focusable="false">
                <path d="M32 6l20 8v16c0 14-8.8 23.6-20 28-11.2-4.4-20-14-20-28V14l20-8z"/>
                <path d="M32 16v30M22 31h20"/>
              </svg>
            </div>
            <div class="home-brand-copy">
              <h2>Procedure &amp; CPD Logbook</h2>
              <p class="home-tagline">Your practice, your progress</p>
            </div>
            <button id="themeToggleButton" class="button secondary theme-toggle compact-theme-toggle" type="button" aria-label="Theme preference: System. Activate to change." aria-describedby="themeToggleHint">System</button>
          </div>
          <p id="themeToggleHint" class="help-text home-theme-hint">Theme: System → Light → Dark</p>

          <div id="backupCard" class="backup-card backup-ok home-backup-card">
            <h2 id="backupTitle">Backup up to date</h2>
            <p id="backupText">Last backup: Never</p>
            <button id="backupNowButton" class="button primary hidden" type="button">Backup now</button>
          </div>

          <div class="home-actions">
            <button id="addEntryButton" class="button primary home-primary-cta" type="button"><span>Add new entry</span><span class="home-chevron" aria-hidden="true">→</span></button>
            <button id="viewLogbookButton" class="button secondary home-nav-card" type="button"><span class="home-nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h11a3 3 0 013 3v13H8a3 3 0 00-3 3V4z"/><path d="M8 4v19"/></svg></span><span>View logbook</span><span class="home-chevron" aria-hidden="true">›</span></button>
            <button id="viewSummariesButton" class="button secondary home-nav-card" type="button"><span class="home-nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h16"/><path d="M7 16v-5"/><path d="M12 16V8"/><path d="M17 16v-9"/></svg></span><span>Summaries</span><span class="home-chevron" aria-hidden="true">›</span></button>
            <button id="managePlacementsButton" class="button secondary home-nav-card" type="button"><span class="home-nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20V6h16v14"/><path d="M9 6V3h6v3"/><path d="M12 10v6"/><path d="M9 13h6"/></svg></span><span>Placements</span><span class="home-chevron" aria-hidden="true">›</span></button>
            <button id="manageSpecialtiesProceduresButton" class="button secondary home-nav-card" type="button"><span class="home-nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 4v5a4 4 0 008 0V4"/><path d="M14 9a5 5 0 105 5v2"/><circle cx="19" cy="17" r="2"/></svg></span><span>Specialties &amp; procedures</span><span class="home-chevron" aria-hidden="true">›</span></button>
            <button id="viewBackupButton" class="button secondary home-nav-card" type="button"><span class="home-nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7h7l2 2h9v10H3z"/><path d="M3 7V5h7l2 2"/></svg></span><span>Backup &amp; export</span><span class="home-chevron" aria-hidden="true">›</span></button>
          </div>
        </div>
        <p id="appVersionLabel" class="app-version-label">v50</p>
      </section>

      <section id="entryTypeScreen" class="screen">
        <h2>What would you like to add?</h2>
        <div class="stacked-buttons">
          <button class="choice-button centered-choice entry-type-button" type="button" data-entry-type="procedure">Procedure</button>
          <button class="choice-button centered-choice entry-type-button" type="button" data-entry-type="cpd">CPD</button>
        </div>
      </section>

      <section id="wizardScreen" class="screen">
        <div class="wizard-top-row">
          <p id="stepLabel" class="step-label"></p>
        </div>
        <h2 id="wizardTitle"></h2>
        <p id="wizardHelp" class="help-text"></p>
        <div id="wizardContent"></div>
      </section>

      <section id="logbookScreen" class="screen">
        <h2>Logbook</h2>
        <div class="filter-row">
          <button class="filter-button active" type="button" data-filter="all">All</button>
          <button class="filter-button" type="button" data-filter="procedure">Procedures</button>
          <button class="filter-button" type="button" data-filter="cpd">CPD</button>
        </div>
        <input id="searchInput" class="search-input" type="search" placeholder="Search logbook">
        <div id="entryList" class="entry-list"></div>
      </section>

      <section id="summariesScreen" class="screen">
        <h2>Summaries</h2>
        <div id="summaryContent"></div>
      </section>

      <section id="placementsScreen" class="screen">
        <h2>Placements</h2>
        <div id="placementsContent"></div>
      </section>

      <section id="specialtiesProceduresScreen" class="screen">
        <h2>Specialties & procedures</h2>
        <div id="specialtiesProceduresContent"></div>
      </section>

      <section id="backupScreen" class="screen">
        <h2>Backup & export</h2>

        <div id="backupScreenStatus" class="backup-card backup-ok">
          <h3 id="backupScreenTitle">Backup up to date</h3>
          <p id="backupScreenText">Last backup: Never</p>
        </div>

        <div class="stacked-buttons">
          <button id="downloadExcelButton" class="button secondary" type="button">Export Excel file</button>
          <button id="downloadJsonButton" class="button secondary" type="button">Backup now</button>
          <button id="importJsonButton" class="button secondary" type="button">Import from backup</button>
        </div>

        <input id="importFileInput" type="file" accept="application/json" hidden>
      </section>
    </main>
  </div>

  <script src="xlsx.full.min.js"></script>
  <script src="js/config.js?v=60"></script>
  <script src="js/utils.js?v=60"></script>
  <script src="app.js?v=60"></script>
</body>
</html>
