name: Syntax check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  javascript-syntax:
    name: JavaScript syntax
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check first-party JavaScript syntax
        run: |
          mapfile -t files < <(find . -type f -name "*.js" \
            ! -name "xlsx.full.min.js" \
            ! -path "./.git/*" | sort)
          printf '%s\n' "${files[@]}"
          for file in "${files[@]}"; do
            node --check "$file"
          done
