name: Deploy to Firebase Hosting test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy_test:
    name: Deploy selected branch to test site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MYLOGBOOK_APP }}
          channelId: live
          projectId: mylogbook-app
          target: test
